name: 4h RSI scan

# Drives the 4-hour cadence for the RSI-below-20 scanner.
# The scan itself lives in the app at /api/cron/fetch-rsi — this workflow
# just pokes that endpoint on a schedule (the Vercel Hobby plan can only run
# crons once a day, so we trigger it from here instead).
#
# The endpoint is idempotent per 4h candle (it skips a candle it has already
# recorded), so polling more often than every 4h is harmless — it just means
# a freshly-closed candle is detected promptly.

on:
  schedule:
    # US 4h candles finalize twice per session: ~13:30 ET (end of the
    # 09:30 bar) and ~16:00 ET (end of the 13:30 bar). We run a few minutes
    # after each, covering both EDT (UTC-4) and EST (UTC-5):
    #   13:30 ET -> 17:30 UTC (EDT) / 18:30 UTC (EST)
    #   16:00 ET -> 20:00 UTC (EDT) / 21:00 UTC (EST)
    # The scan is idempotent per candle, so the runs that fall on the "wrong"
    # DST offset simply find nothing new. GitHub runs schedules in UTC and may
    # delay them a few minutes under load, which is fine for a 4h candle.
    - cron: "35 17 * * 1-5"
    - cron: "35 18 * * 1-5"
    - cron: "5 20 * * 1-5"
    - cron: "5 21 * * 1-5"
  # Manual "Run workflow" button for testing / one-off scans.
  workflow_dispatch: {}

# Never let two scans overlap.
concurrency:
  group: rsi-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger RSI scan
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # Override in repo Settings > Variables if the deployment URL changes.
          ENDPOINT: ${{ vars.SCAN_ENDPOINT || 'https://stock-4hr-rsi-detection.vercel.app/api/cron/fetch-rsi' }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is not set."
            exit 1
          fi
          echo "Hitting $ENDPOINT"
          code=$(curl -sS --max-time 90 -w '%{http_code}' -o /tmp/resp.json \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$ENDPOINT")
          echo "HTTP $code"
          echo "--- response (truncated) ---"
          head -c 4000 /tmp/resp.json || true
          echo ""
          if [ "$code" != "200" ]; then
            echo "::error::Scan endpoint returned HTTP $code"
            exit 1
          fi
